<link rel="stylesheet" href="common.css">
<style>
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; min-width: 260px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; overflow-y: auto; transition: transform 0.3s; }
  .main { flex: 1; margin-left: 260px; min-height: 100vh; }

  .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 1.1em; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .sidebar-header .sub { font-size: 0.78em; color: var(--text-dim); }
  .sidebar-stats { display: flex; gap: 16px; margin-top: 10px; }
  .sidebar-stats span { font-size: 0.75em; color: var(--text-dim); }
  .sidebar-stats strong { color: var(--accent); }

  .sidebar-search { padding: 12px 16px 8px; position: relative; }
  .sidebar-search input { width: 100%; padding: 8px 12px 8px 32px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85em; background: var(--code-bg); color: var(--text); outline: none; }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search svg { position: absolute; left: 26px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }

  .sidebar-cat { border-bottom: 1px solid var(--border); }
  .sidebar-cat-header { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .sidebar-cat-header:hover { background: var(--code-bg); }
  .sidebar-cat-header .arrow { transition: transform 0.2s; font-size: 0.7em; color: var(--text-dim); }
  .sidebar-cat-header.collapsed .arrow { transform: rotate(-90deg); }
  .sidebar-cat-title { font-size: 0.85em; font-weight: 600; color: var(--text); flex: 1; }
  .sidebar-cat-count { font-size: 0.7em; color: var(--text-dim); background: var(--code-bg); padding: 1px 6px; border-radius: 8px; }
  .sidebar-cat-icon { width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7em; flex-shrink: 0; }

  .sidebar-cat-items { overflow: hidden; transition: max-height 0.3s ease; }
  .sidebar-cat-items.collapsed { max-height: 0 !important; }
  .sidebar-item { display: block; padding: 6px 16px 6px 44px; font-size: 0.82em; color: var(--text-dim); text-decoration: none; transition: all 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); margin-top: auto; }
  .theme-btn { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--code-bg); color: var(--text); cursor: pointer; font-size: 0.85em; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
  .theme-btn:hover { background: var(--highlight); }

  .main-header { padding: 24px 32px 0; }

  .main-header p { font-size: 0.88em; color: var(--text-dim); margin: 4px 0 0; }
  .main-content { padding: 16px 32px 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 6px; transition: all 0.2s; }
  .card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(9,105,218,0.08); transform: translateY(-1px); }

  .card-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .card-desc { color: var(--text-dim); font-size: 0.8em; line-height: 1.4; }
  .card-meta { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { display: inline-block; padding: 1px 7px; border-radius: 8px; font-size: 0.68em; font-weight: 500; }
  .tag-blue { background: rgba(9,105,218,0.08); color: #0969da; border: 1px solid rgba(9,105,218,0.2); }
  .tag-green { background: rgba(26,127,55,0.08); color: #1a7f37; border: 1px solid rgba(26,127,55,0.2); }
  .tag-purple { background: rgba(130,80,223,0.08); color: #8250df; border: 1px solid rgba(130,80,223,0.2); }
  .tag-orange { background: rgba(188,76,0,0.08); color: #bc4c00; border: 1px solid rgba(188,76,0,0.2); }
  .tag-red { background: rgba(207,34,46,0.08); color: #cf222e; border: 1px solid rgba(207,34,46,0.2); }
  .card.hidden { display: none; }
  .no-results { display: none; text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .no-results.visible { display: block; }

  .mobile-toggle { display: none; position: fixed; top: 12px; left: 12px; z-index: 100; width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); cursor: pointer; font-size: 1.1em; }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .mobile-toggle { display: flex; align-items: center; justify-content: center; }
    .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 40; }
    .overlay.visible { display: block; }
  }

  [data-theme="dark"] .sidebar-item:hover { background: #343746; color: #f8f8f2; }

const ICON_MAP = {
  linux: { emoji: "🐧", color: "#0969da" },
  windows: { emoji: "🪟", color: "#0078d4" },
  rust: { emoji: "🦀", color: "#dea584" },
  zephyr: { emoji: "⚡", color: "#1769aa" },
  docker: { emoji: "🐳", color: "#2496ed" },
  ai: { emoji: "🤖", color: "#ff6b6b" },
  embedded: { emoji: "🔧", color: "#bc4c00" },
  other: { emoji: "📦", color: "#656d76" }
};

// ============================================================
// 渲染侧边栏
// ============================================================
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const tops = {};
  DOCS.forEach(d => {
    if (!tops[d.top]) tops[d.top] = { label: d.topLabel, items: [] };
    tops[d.top].items.push(d);
  });

  let html = '';
  for (const [key, top] of Object.entries(tops)) {
    const info = ICON_MAP[key] || ICON_MAP.other;
    html += `<div class="sidebar-cat" data-top="${key}">
      <div class="sidebar-cat-header" onclick="toggleCat(this)">
        <div class="sidebar-cat-icon" style="background:${info.color}20;color:${info.color}">${info.emoji}</div>
        <span class="sidebar-cat-title">${top.label}</span>
        <span class="sidebar-cat-count">${top.items.length}</span>
        <span class="arrow">▾</span>
      </div>
      <div class="sidebar-cat-items">`;
    top.items.forEach(d => {
      html += `<a href="${d.f}" class="sidebar-item" data-search="${(d.t+' '+d.d+' '+d.tags.join(' ')).toLowerCase()}">${d.t}</a>`;
    });
    html += `</div></div>`;
  }
  nav.innerHTML = html;
}

// ============================================================
// 渲染主内容区
// ============================================================
function renderMain(docs) {
  const grid = document.getElementById('main-grid');
  const cats = {};
  (docs || DOCS).forEach(d => {
    if (!cats[d.cat]) cats[d.cat] = { label: d.catLabel, items: [] };
    cats[d.cat].items.push(d);
  });

  let html = '';
  for (const [key, cat] of Object.entries(cats)) {
    html += `<div class="category" data-cat="${key}">
      <div style="display:flex;align-items:center;gap:8px;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);">
        <span style="font-weight:600;font-size:0.95em;">${cat.label}</span>
        <span style="font-size:0.75em;color:var(--text-dim);background:var(--code-bg);padding:1px 6px;border-radius:8px;">${cat.items.length}</span>
      </div>
      <div class="grid">`;
    cat.items.forEach(d => {
      const info = ICON_MAP[d.top] || ICON_MAP.other;
      const tagsHtml = d.tags.map(t => `<span class="tag tag-${d.i}">${t}</span>`).join('');
      html += `<a href="${d.f}" class="card" data-search="${(d.t+' '+d.d+' '+d.tags.join(' ')).toLowerCase()}">
        <div class="card-top">
          <div class="card-icon" style="background:${info.color}20;color:${info.color}">${info.emoji}</div>
          <div class="card-title">${d.t}</div>
        </div>
        <div class="card-desc">${d.d}</div>
        <div class="card-meta">${tagsHtml}</div>
      </a>`;
    });
    html += `</div></div>`;
  }
  grid.innerHTML = html;
}

// ============================================================
// 交互
// ============================================================
function toggleCat(h) {
  const items = h.nextElementSibling;
  h.classList.toggle('collapsed');
  if (items.classList.contains('collapsed')) { items.classList.remove('collapsed'); items.style.maxHeight = items.scrollHeight+'px'; }
  else { items.style.maxHeight = items.scrollHeight+'px'; requestAnimationFrame(()=>items.classList.add('collapsed')); }
}

const searchInput = document.getElementById('search');
let currentTop = null;

searchInput.addEventListener('input', function() { filterDocs(this.value.toLowerCase().trim(), currentTop); });

function filterDocs(q, top) {
  let total = 0;
  document.querySelectorAll('.card').forEach(c => {
    const mQ = !q || c.dataset.search.includes(q);
    const mT = !top || c.closest('.category')?.dataset.top === top;
    c.classList.toggle('hidden', !(mQ && mT));
    if (mQ && mT) total++;
  });
  document.querySelectorAll('.category').forEach(c => {
    c.style.display = c.querySelectorAll('.card:not(.hidden)').length ? '' : 'none';
  });
  document.getElementById('no-results').classList.toggle('visible', total === 0);
  document.getElementById('total-count').textContent = total;
}

document.addEventListener('click', e => {
  // 侧边栏分类标题：按领域过滤
  const ch = e.target.closest('.sidebar-cat-header');
  if (ch && !e.target.closest('.sidebar-item')) {
    const top = ch.closest('.sidebar-cat').dataset.top;
    currentTop = currentTop === top ? null : top;
    document.querySelectorAll('.sidebar-cat-header').forEach(h => h.style.background = '');
    if (currentTop) ch.style.background = 'var(--highlight)';
    document.getElementById('main-title').textContent = currentTop ? (ICON_MAP[currentTop]?.emoji||'') + ' ' + DOCS.find(d=>d.top===currentTop)?.topLabel : '全部文档';
    filterDocs(searchInput.value.toLowerCase().trim(), currentTop);
  }
});

document.getElementById('mobile-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
});
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
});

document.getElementById('total-count').textContent = DOCS.length;
document.getElementById('total-topics').textContent = [...new Set(DOCS.map(d=>d.top))].length;
renderSidebar();
renderMain();
</script>
